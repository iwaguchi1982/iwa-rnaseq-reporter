[project]
name = "iwa-rnaseq-reporter"
version = "0.1.0"
description = "Wet-first RNA-Seq reporter"
authors = ["Jun Iwaguchi"]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
pandas = ">=2.2.0,<3"
streamlit = ">=1.44.0,<2"
numpy = ">=1.26.0,<2"
scikit-learn = ">=1.4.0,<2"
plotly = ">=5.18.0,<6"
matplotlib = ">=3.8.0,<4"
biopython = ">=1.84,<2"
psutil = ">=7.0.0,<8"
pyyaml = ">=6.0.2,<7"
pytest = ">=8.0.0,<9"
scipy = ">=1.12.0,<2"
statsmodels = ">=0.14.0,<1"

[tasks]
app = "streamlit run iwa_rnaseq_reporter.py"
test = "pytest"